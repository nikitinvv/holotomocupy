path=/data3/vnikitin/brain/20251115/Y350a_new      # raw data root (contains Y350a_HT_20nm_8dist_1_ etc.)
pfile=Y350a_HT_20nm_8dist                          # scan prefix name
path_out=/data3/vnikitin/brain/20251115/Y350a_new_rec # output directory

start_step=2          # 1=convert, 2=preprocess, 3=shifts, 4=binned, 5=paganin+fbp
rotation_center_shift=-8.780113 # shift of the rotation center with respect to the detector center
nlevels=4             # number of binning levels (step 4)
paganin=20            # delta/beta ratio for multi-distance Paganin (step 5)
nchunk=16             # z-slices per GPU chunk in FBP (step 5)
ref_dist=2            # reference distance index for motion-shift baseline (step 3)
n=2048                   # 0 = auto-detect from EDF; set >0 to override crop size
nobj=3264                # 0 = auto-compute from n and magnifications; set >0 to override
log_level=INFO        # DEBUG, INFO, WARNING, ERROR
